spring.application.name=default-application
spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/../.env[.properties],optional:file:${user.dir}/grievance-service/.env[.properties],optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:./grievance-service/.env[.properties]
server.port=${SPRING_SERVER_PORT:8080}
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS}

#swagger
springdoc.swagger-ui.path=swagger-ui.html
springdoc.swagger-ui.doc-expansion=none
openapi.servers=${OPENAPI_SERVERS}
openapi.server.description=${OPENAPI_SERVER_DESCRIPTION}

#db
# Database Connection Properties
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST}:${SPRING_DATASOURCE_PORT}/${SPRING_DATASOURCE_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.topic.grievance-created=grievance-created

server.max-http-request-header-size=64KB
