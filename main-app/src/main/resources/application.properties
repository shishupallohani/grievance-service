spring.application.name=default-application
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.port=${SPRING_SERVER_PORT:8080}
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

#swagger
springdoc.swagger-ui.path=swagger-ui.html
springdoc.swagger-ui.doc-expansion=none
openapi.servers=${OPENAPI_SERVERS:http://localhost:8080}
openapi.server.description=${OPENAPI_SERVER_DESCRIPTION:Local}

#db
# Database Connection Properties
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_NAME:devdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:apiuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devpass1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.topic.grievance-created=grievance-created

server.max-http-request-header-size=64KB
